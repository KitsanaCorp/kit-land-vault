server:
  port: 8080

spring:
  application:
    name: kitlandvault-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/kitlandvault
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
