<div class="col-span-1 lg:col-span-7 cozy-card p-5">
    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-4">
        <h2 class="text-sm font-semibold text-slate-800">Balance History</h2>
        
        <!-- Interactive Period Toggles -->
        <div class="flex bg-slate-100/50 p-1 rounded-full border border-slate-200/60 overflow-x-auto no-scrollbar w-full sm:w-auto">
            @for (period of periods; track period) {
                <button 
                    (click)="selectPeriod(period)"
                    class="text-[11px] px-3 py-1 rounded-full font-medium transition-colors whitespace-nowrap"
                    [ngClass]="activePeriod === period ? 'bg-white text-[#6B8E7B] shadow-sm ring-1 ring-slate-900/5' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'">
                    {{ period | uppercase }}
                </button>
            }
        </div>
    </div>
    
    <!-- Legend -->
    <div class="flex flex-wrap gap-2 justify-start sm:justify-end mb-4">
        @for (ds of datasets; track ds.label; let i = $index) {
            <button
                class="text-[10px] font-bold px-3 py-1 mb-1 sm:mb-0 rounded-full transition-all duration-200 border-2"
                [style.background-color]="ds.visible ? ds.color : 'transparent'"
                [style.border-color]="ds.color"
                [style.color]="ds.visible ? 'white' : ds.color"
                (click)="toggleDataset(i)">
                {{ ds.label }}
            </button>
        }
    </div>

    <!-- Chart Canvas -->
    <div class="w-full h-48 lg:h-64">
        <canvas #balanceCanvas></canvas>
    </div>
</div>
