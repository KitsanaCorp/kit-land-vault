<div class="col-span-1 lg:col-span-7 cozy-card p-5">
    <div class="flex flex-col sm:flex-row justify-between items-start gap-3 mb-4">
        <h2 class="text-sm font-semibold text-slate-800">Balance History</h2>
        <div class="flex flex-wrap gap-2 justify-end">
            @for (ds of datasets; track ds.label; let i = $index) {
                <button
                    class="text-[10px] font-bold px-3 py-1 rounded-full transition-all duration-200 border-2"
                    [style.background-color]="ds.visible ? ds.color : 'transparent'"
                    [style.border-color]="ds.color"
                    [style.color]="ds.visible ? 'white' : ds.color"
                    (click)="toggleDataset(i)">
                    {{ ds.label }}
                </button>
            }
        </div>
    </div>
    <div class="w-full h-48 lg:h-64">
        <canvas #balanceCanvas></canvas>
    </div>
</div>
